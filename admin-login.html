<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">KJ</div>
          <h1>Admin Panel</h1>
          <p>Sign in to manage your portfolio</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%">
            Sign In
          </button>
        </form>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <button id="googleSignIn" class="btn-google">
          <i class="fab fa-google"></i> Sign in with Google
        </button>

        <div class="auth-footer">
          <p>
            Don't have an account? <a href="#" id="signupLink">Contact admin</a>
          </p>
          <a href="index-new.html" class="back-link">Back to Portfolio</a>
        </div>
      </div>

      <!-- Background Animation -->
      <div class="auth-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase Compat (for global firebase object) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/admin-access.js"></script>
    <script>
      // Initialize Firebase as soon as scripts are loaded
      if (typeof initializeFirebase === "function") {
        initializeFirebase();
      }
    </script>
    <script src="js/auth.js"></script>
  </body>
</html>
