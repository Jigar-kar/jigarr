<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kar Jigar - Professional Portfolio</title>
    <meta http-equiv="refresh" content="0;url=index-new.html" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: &quot;Inter&quot;, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        text-align: center;
      "
    >
      <div
        style="
          background: rgba(15, 23, 42, 0.8);
          backdrop-filter: blur(10px);
          padding: 40px;
          border-radius: 12px;
          border: 1px solid rgba(226, 232, 240, 0.1);
          box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        "
      >
        <h1 style="font-size: 2rem; margin-bottom: 20px; color: #60a5fa">
          🚀 Welcome to Your Portfolio
        </h1>
        <p style="font-size: 1.1rem; margin-bottom: 30px; color: #cbd5e1">
          Redirecting to your professional portfolio...
        </p>
        <p style="margin-bottom: 30px; color: #94a3b8">
          If not redirected automatically:
        </p>
        <a
          href="index-new.html"
          style="
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.3s ease;
            cursor: pointer;
          "
          onmouseover="this.style.transform = 'translateY(-2px)'"
          onmouseout="this.style.transform = 'translateY(0)'"
          >Click Here to Continue</a
        >
      </div>
    </div>
  </body>
</html>
